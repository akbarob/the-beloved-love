<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c84a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8960c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4535;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e3328;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Crown -->
  <g transform="translate(200, 18)">
    <!-- Crown body -->
    <path d="M-28 22 L-22 4 L-10 14 L0 -4 L10 14 L22 4 L28 22 Z"
      fill="url(#goldGrad)" stroke="#b8960c" stroke-width="0.6" stroke-linejoin="round"/>
    <!-- Crown base bar -->
    <rect x="-28" y="22" width="56" height="5" rx="2.5"
      fill="url(#goldGrad)" stroke="#b8960c" stroke-width="0.4"/>
    <!-- Crown jewels -->
    <circle cx="0" cy="-1" r="3" fill="#fff8e7" opacity="0.9"/>
    <circle cx="-22" cy="8" r="2.2" fill="#fff8e7" opacity="0.8"/>
    <circle cx="22" cy="8" r="2.2" fill="#fff8e7" opacity="0.8"/>
    <!-- Small accent dots -->
    <circle cx="-11" cy="3" r="1.2" fill="#fff8e7" opacity="0.6"/>
    <circle cx="11" cy="3" r="1.2" fill="#fff8e7" opacity="0.6"/>
  </g>

  <!-- TBL Monogram -->
  <text
    x="200" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#darkGrad)"
  >TBL</text>

  <!-- Thin gold rule under TBL -->
  <line x1="110" y1="110" x2="290" y2="110" stroke="url(#goldGrad)" stroke-width="1" opacity="0.7"/>

  <!-- THE BELOVED LOVE -->
  <text
    x="200" y="130"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#2e3328"
  >THE BELOVED LOVE</text>

  <!-- INITIATIVE -->
  <text
    x="200" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9"
    font-weight="400"
    letter-spacing="8"
    text-anchor="middle"
    fill="#4a5240"
  >INITIATIVE</text>

  <!-- Decorative side flourishes -->
  <g opacity="0.5">
    <!-- Left flourish -->
    <line x1="60" y1="139" x2="100" y2="139" stroke="#d4af37" stroke-width="0.8"/>
    <circle cx="58" cy="139" r="1.5" fill="#d4af37"/>
    <!-- Right flourish -->
    <line x1="300" y1="139" x2="340" y2="139" stroke="#d4af37" stroke-width="0.8"/>
    <circle cx="342" cy="139" r="1.5" fill="#d4af37"/>
  </g>

  <!-- Tagline -->
  <text
    x="200" y="172"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7.5"
    font-style="italic"
    letter-spacing="2"
    text-anchor="middle"
    fill="#6a7a60"
    opacity="0.85"
  >Discovering Purpose. Restoring Identity. Awakening Love.</text>
</svg>
